services:
  - type: web
    name: SunkenBot
    runtime: node
    plan: free

    # ─── Build & Start ───────────────────────────────────────
    buildCommand: npm install --omit=dev
    startCommand: node index.js

    # ─── Health Check ────────────────────────────────────────
    # Render يستخدم هذا لمعرفة أن البوت جاهز
    healthCheckPath: /api/health

    # ─── Environment Variables ───────────────────────────────
    # أضف هذه في Dashboard → Environment بدلاً من هنا (أكثر أماناً)
    envVars:
      - key: NODE_ENV
        value: production

      # ضع باقي المتغيرات من .env.example في لوحة Render
      # - key: FB_EMAIL
      #   value: your_email
      # - key: MONGO_URI
      #   sync: false

    # ─── Auto Deploy ─────────────────────────────────────────
    autoDeploy: true
